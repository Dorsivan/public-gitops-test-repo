apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-two
  namespace: app-two
  labels:
    app: app-two
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-two
  template:
    metadata:
      labels:
        app: app-two
    spec:
      containers:
        - name: httpd
          image: httpd:2.4
          ports:
            - containerPort: 80
