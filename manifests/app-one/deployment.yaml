apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-one
  namespace: app-one
  labels:
    app: app-one
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app-one
  template:
    metadata:
      labels:
        app: app-one
    spec:
      containers:
        - name: nginx
          image: nginx:1.27
          ports:
            - containerPort: 80
